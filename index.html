<title>Fantasy Auction Dashboard</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

h1 { margin-bottom: 6px; }

.summary {
  background: white;
  padding: 12px;
  margin-bottom: 20px;
  border-left: 6px solid #111;
  font-size: 16px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ccc;
  padding:4px;
  text-align:center;
  height:32px;
  white-space: nowrap;
}

th {
  background:#111;
  color:white;
  position: sticky;
  top: 0;
  z-index: 2;
}

input {
  padding:6px;
  margin:4px;
  width:200px;
}

.table-container {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 700px;
  border: 1px solid #ccc;
}

.sticky-player {
  position: sticky;
  left: 0;
  background: white;
  z-index: 3;
  font-weight: bold;
}

th.sticky-player {
  background: #000;
  z-index: 4;
}
</style>
</head>

/* ===== BUILD TABLE ===== */
function buildPointsTable(data){

  if(data.length === 0){
    pointsHead.innerHTML = "";
    pointsBody.innerHTML = "<tr><td>No data</td></tr>";
    return;
  }

  const fixedCols = [
    "match_id",
    "player",
    "auction_tour_01",
    "auction_tour_02",
    "bidstrom_auction_2.0_team",
    "team_1",
    "team_2",
    "total_points"
  ];

  const allCols = Object.keys(data[0]);
  const remainingCols = allCols.filter(c => !fixedCols.includes(c));

  const finalCols = [...fixedCols, ...remainingCols];

  /* HEADER */
  pointsHead.innerHTML =
    "<tr>" +
    finalCols.map(c =>
      c === "player"
        ? `<th class="sticky-player">${c}</th>`
        : `<th>${c}</th>`
    ).join("") +
    "</tr>";

  /* BODY (LIMIT FOR PERFORMANCE) */
  pointsBody.innerHTML = data.slice(0, 500).map(row =>
    "<tr>" +
    finalCols.map(c =>
      c === "player"
        ? `<td class="sticky-player">${row[c] ?? ""}</td>`
        : `<td>${row[c] ?? ""}</td>`
    ).join("") +
    "</tr>"
  ).join("");
}

/* ===== FILTER LOGIC ===== */
function applyFilters(){

  const m = matchFilter.value.toLowerCase();
  const p = playerFilter.value.toLowerCase();
  const t1 = team1Filter.value.toLowerCase();
  const t2 = team2Filter.value.toLowerCase();
  const tm1 = team01Filter.value.toLowerCase();
  const tm2 = team02Filter.value.toLowerCase();
  const bs = bidstromFilter.value.toLowerCase();

  buildPointsTable(
    pointsData.filter(r =>
      String(r.match_id).toLowerCase().includes(m) &&
      String(r.player).toLowerCase().includes(p) &&
      String(r.auction_tour_01 || "").toLowerCase().includes(t1) &&
      String(r.auction_tour_02 || "").toLowerCase().includes(t2) &&
      String(r.team_1 || "").toLowerCase().includes(tm1) &&
      String(r.team_2 || "").toLowerCase().includes(tm2) &&
      String(r["bidstrom_auction_2.0_team"] || "").toLowerCase().includes(bs)
    )
  );
}

/* ===== EVENTS ===== */

playerFilter.oninput = applyFilters;
